<!doctype html>
<html lang="en">
  <head>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'rgba(0,0,0,0.95)';
        div.style.color = '#ff3333';
        div.style.padding = '20px';
        div.style.zIndex = '99999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.overflow = 'auto';
        div.innerHTML = '<h1>Javascript Crash Detected!</h1>' +
                        '<p><strong>Message:</strong> ' + message + '</p>' +
                        '<p><strong>Source:</strong> ' + source + '</p>' +
                        '<p><strong>Line:</strong> ' + lineno + ' | <strong>Col:</strong> ' + colno + '</p>' +
                        '<pre style=\"white-space: pre-wrap; word-wrap: break-word;\">' + (error && error.stack ? error.stack : 'No stack trace available') + '</pre>';
        document.body.appendChild(div);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.height = '100%';
        div.style.backgroundColor = 'rgba(0,0,0,0.95)';
        div.style.color = '#ff8800';
        div.style.padding = '20px';
        div.style.zIndex = '99999';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.overflow = 'auto';
        div.innerHTML = '<h1>Unhandled Promise Rejection Detected!</h1>' +
                        '<p><strong>Reason:</strong> ' + event.reason + '</p>' +
                        '<pre style=\"white-space: pre-wrap; word-wrap: break-word;\">' + (event.reason && event.reason.stack ? event.reason.stack : 'No stack trace available') + '</pre>';
        document.body.appendChild(div);
      });
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenwar – Smart Workshop &amp; Billing Management</title>
    <meta name="description" content="Premium, state-of-the-art mechanic garage workshop dashboard and billing management software. Engineered for Zenwar modern automotive care shops, bike garages, and parts hubs." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
